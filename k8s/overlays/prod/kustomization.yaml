apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prospero runs in the default namespace alongside course-server and
# eyc-weather; the shared Postgres pod lives in `life-balance` and is
# reached via its ClusterIP service.
resources:
  - ../../base
  - configmap.yaml
  - secrets.yaml
  - ingress.yaml
# Production image tag. Bumped by scripts/release.sh from the CLI.
images:
  - name: llamagraphics/prospero
    newTag: "0.6.1"
