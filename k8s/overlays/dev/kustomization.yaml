apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prospero sits in the `default` namespace on docker-desktop alongside
# the existing drupal6 and registrar apps, all fronted by the same nginx
# ingress on host `localhost`.

resources:
  - ../../base
  - configmap.yaml
  - secrets.yaml
  - ingress.yaml

patches:
  - path: deployment-patch.yaml

# Locally-built dev image; re-tagged per build by scripts/deploy-dev.sh.
images:
  - name: llamagraphics/prospero
    newTag: "dev"
